# LiteLLM proxy config — only used with: docker compose --profile live up
# Set OPENAI_API_KEY / ANTHROPIC_API_KEY in .env before starting.

model_list:
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: claude-3-5-sonnet
    litellm_params:
      model: anthropic/claude-3-5-sonnet-20241022
      api_key: os.environ/ANTHROPIC_API_KEY

litellm_settings:
  # Emit a callback event for every LLM call — wire to your Kafka producer here
  success_callback: []
  failure_callback: []
  drop_params: true

general_settings:
  master_key: sk-llm-observability-dev
